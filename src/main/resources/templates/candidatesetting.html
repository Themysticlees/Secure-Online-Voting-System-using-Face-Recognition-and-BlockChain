  <script>
    var win = navigator.platform.indexOf('Win') > -1;
    if (win && document.querySelector('#sidenav-scrollbar')) {
      var options = {
        damping: '0.5'
      }
      Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }



    $(document).ready(function () {
      $("#fileimage1").change(function () {
        showImageThumbnail(this);
      });
    });

    function showImageThumbnail(fileInput) {
      file = fileInput.files[0];
      reader = new FileReader();

      reader.onload = function (e) {
        $("#thumbnail1").attr("src", e.target.result);
        $("#thumbnail1").css("display", "block");
      };
      reader.readAsDataURL(file);
    }

    function displayParty(){
      var d = document.getElementById("displayPartyPic")
      var partyname = d.options[d.selectedIndex].text;
      console.log("party pic"+partyname)
      var link="/images/"+partyname+".jpeg"
      document.getElementById("partyflag").setAttribute("src",link)
      document.getElementById("partyflag").setAttribute("height",150)
    }



    



  </script>
